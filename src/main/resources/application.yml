server:
  port: 8080

spring:
  application:
    name: votesecure

  # H2 Database (development — no install needed)
  datasource:
    url: jdbc:h2:mem:votesecure;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # Redis — fallback to in-memory if not available
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000

# JWT Configuration
jwt:
  secret: VoteSecureJWTSecretKey2024ThisMustBeAtLeast256BitsLongForHS256Algorithm!!
  expiration: 3600000  # 1 hour in milliseconds

# Election Encryption Key (in production: HSM / Vault)
election:
  encryption:
    key: dGhpc0lzQVNlY3JldEtleUZvclZvdGVFbmNyeXB0aW9u  # Base64 encoded 256-bit key
  aadhaar:
    salt: VoteSecureAadhaarSalt2024SecretValue

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# CORS
app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001
