# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
services:
  # Backend: Spring Boot (Dockerized)
  - type: web
    name: votesecure-backend
    runtime: docker
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 10000
      - key: SPRING_DATASOURCE_URL
        value: jdbc:h2:mem:votesecure;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      - key: ALLOWED_ORIGINS
        value: https://votesecure-frontend.onrender.com

  # Frontend: React + Vite (Static)
  - type: web
    name: votesecure-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://votesecure-backend.onrender.com/api
